<!DOCTYPE html>
<html>
<head>
<title>RijAI - Future AI</title>

<style>
body{
margin:0;
background:#050816;
color:white;
font-family:Arial;
text-align:center;
}

.container{
padding:30px;
}

.brain{
width:170px;
height:120px;
margin:20px auto;
border-radius:50%;
background:radial-gradient(circle,#4da6ff,#111827);
box-shadow:0 0 40px #4da6ff;
display:flex;
align-items:center;
justify-content:center;
animation:float 3s infinite;
}

.brain:before,
.brain:after{
content:"";
position:absolute;
}

.brain span{
font-size:55px;
font-weight:bold;
text-shadow:0 0 20px white;
}

h1{
font-size:55px;
color:#4da6ff;
text-shadow:0 0 25px #4da6ff;
}

.card{
background:#111827;
max-width:550px;
margin:auto;
padding:30px;
border-radius:25px;
box-shadow:0 0 30px #2563eb;
}

input{
padding:15px;
border-radius:20px;
border:none;
width:60%;
}

button{
padding:15px;
margin:5px;
border-radius:20px;
border:none;
background:#4da6ff;
color:white;
}

#reply{
margin-top:20px;
color:#4da6ff;
}

@keyframes float{
50%{
transform:translateY(-15px);
}
}
</style>

</head>

<body>

<div class="container">

<div class="brain">
<span>RI</span>
</div>

<h1>RijAI</h1>

<p>Your futuristic AI assistant</p>


<div class="card">

<h2>Chat with RijAI</h2>

<input id="message" placeholder="Ask anything...">

<br>

<button onclick="sendMessage()">Send</button>

<button onclick="voice()">🎤</button>

<br><br>

<input type="file" accept="image/*">

<div id="reply"></div>

</div>

</div>


<script>

async function sendMessage(){

let box=document.getElementById("reply");

box.innerHTML="Thinking 🤖";

try{

let response=await fetch(
"https://rijai.onrender.com"
);

let data=await response.text();

box.innerHTML=data;

}

catch{

box.innerHTML="Server not connected";

}

}


function voice(){

let speech=new webkitSpeechRecognition();

speech.onresult=function(event){

document.getElementById("message").value=
event.results[0][0].transcript;

};

speech.start();

}

</script>


</body>
</html>
