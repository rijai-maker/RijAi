<!DOCTYPE html>
<html>
<head>
<title>RijAI - Future AI</title>

<style>
body {
  margin: 0;
  background: #050816;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  width: 300px;
  height: 300px;
  background: #2563eb;
  filter: blur(120px);
  top: 20%;
  left: 50%;
  animation: glow 5s infinite alternate;
}

.container {
  padding: 50px 20px;
  animation: fade 2s;
}

.logo {
  font-size: 70px;
  animation: float 3s infinite ease-in-out;
}

h1 {
  font-size: 50px;
  color: #4da6ff;
  animation: shine 2s infinite alternate;
}

p {
  color: #cccccc;
  font-size: 20px;
}

.box {
  background: #111827;
  padding: 30px;
  border-radius: 25px;
  max-width: 500px;
  margin: 40px auto;
  animation: slide 1.5s;
  box-shadow: 0 0 30px #2563eb;
}

input {
  padding: 15px;
  width: 70%;
  border-radius: 20px;
  border: none;
}

button {
  padding: 15px;
  border-radius: 20px;
  background: #4da6ff;
  color: white;
  border: none;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

@keyframes float {
  50% {
    transform: translateY(-15px);
  }
}

@keyframes fade {
  from {opacity:0;}
  to {opacity:1;}
}

@keyframes slide {
  from {
    transform: translateY(50px);
    opacity:0;
  }
  to {
    transform: translateY(0);
    opacity:1;
  }
}

@keyframes glow {
  from {transform: scale(1);}
  to {transform: scale(1.5);}
}

@keyframes shine {
  from {text-shadow:0 0 5px #4da6ff;}
  to {text-shadow:0 0 25px #4da6ff;}
}

</style>

</head>

<body>

<div class="container">

<div class="logo">🧠</div>

<h1>RijAI</h1>

<p>Your futuristic AI assistant</p>

<div class="box">

<h2>Chat with RijAI</h2>

<input placeholder="Ask anything...">

<button>Send</button>

</div>

</div>

</body>
</html>
