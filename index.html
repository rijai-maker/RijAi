<!DOCTYPE html>
<html>
<head>
<title>RijAI - Your AI Assistant</title>

<style>
body {
    margin: 0;
    background: #050816;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
}

.container {
    padding: 40px 20px;
}

.logo {
    font-size: 70px;
    font-weight: bold;
    color: #4da6ff;
    animation: float 3s infinite;
    text-shadow: 0 0 25px #4da6ff;
}

h1 {
    font-size: 50px;
    color: #4da6ff;
}

.card {
    background: #111827;
    max-width: 500px;
    margin: 30px auto;
    padding: 25px;
    border-radius: 25px;
    box-shadow: 0 0 30px #2563eb;
}

input {
    width: 65%;
    padding: 15px;
    border-radius: 20px;
    border: none;
}

button {
    padding: 15px;
    margin: 5px;
    border-radius: 20px;
    border: none;
    background: #4da6ff;
    color: white;
}

#reply {
    margin-top: 20px;
    color: #4da6ff;
}

@keyframes float {
    50% {
        transform: translateY(-15px);
    }
}
</style>

</head>

<body>

<div class="container">

<div class="logo">RI</div>

<h1>RijAI</h1>

<p>Your futuristic AI assistant</p>

<div class="card">

<h2>Chat with RijAI</h2>

<input id="message" placeholder="Ask anything...">

<br>

<button onclick="sendMessage()">Send</button>

<button onclick="startVoice()">🎤 Voice</button>

<br><br>

<input type="file" accept="image/*">

<div id="reply"></div>

</div>

</div>


<script>

function startVoice(){

let recognition = new webkitSpeechRecognition();

recognition.onresult = function(event){

document.getElementById("message").value =
event.results[0][0].transcript;

};

recognition.start();

}


async function sendMessage(){

let text =
document.getElementById("message").value;

document.getElementById("reply").innerHTML =
"Thinking 🤖";

try {

let response = await fetch(
"https://rijai.onrender.com"
);

let data = await response.text();

document.getElementById("reply").innerHTML=data;

}

catch{

document.getElementById("reply").innerHTML=
"Server not connected";

}

}

</script>


</body>
</html>
